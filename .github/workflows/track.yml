name: 追蹤松山運動中心人數

on:
  # 每 10 分鐘一次，只在台北營業時段（06:00–22:00，即 UTC 22:00–13:59）。
  # 註：GitHub 的排程為 UTC，且在尖峰時可能延遲數分鐘。
  schedule:
    - cron: "*/10 0-13,22,23 * * *"
  # 允許手動觸發測試
  workflow_dispatch:

# 允許 workflow 把新資料 commit 回 repo
permissions:
  contents: write

# 避免多個排程同時執行造成 push 衝突
concurrency:
  group: track-occupancy
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 抓取即時人數
        # 每次觸發連續抓 4 筆、每 3 分鐘一筆（涵蓋約 9 分鐘）。
        # GitHub 排程可能延遲或跳過，這樣即使間隔拉長也能補齊資料密度。
        run: python fetch.py --samples 4 --interval 180

      - name: Commit 新資料
        run: |
          git config user.name  "occupancy-bot"
          git config user.email "occupancy-bot@users.noreply.github.com"
          if git diff --quiet -- data/sssc.csv; then
            echo "沒有新資料，略過 commit"
            exit 0
          fi
          git add data/sssc.csv
          git commit -m "data: 松山人數 $(date -u +%Y-%m-%dT%H:%MZ)"
          # push 前先 rebase，避免與其他排程執行衝突
          git pull --rebase --autostash origin ${GITHUB_REF_NAME}
          git push
