name: 追蹤松山運動中心人數

on:
  # 一天只觸發 4 次（低頻率，GitHub 排程才可靠）。
  # 每次觸發後 job 會持續跑約 4 小時，內部精準每 10 分鐘抓一筆。
  # 觸發時間（UTC）對應台北 06:00 / 10:00 / 14:00 / 18:00：
  schedule:
    - cron: "0 22 * * *"   # 台北 06:00
    - cron: "0 2 * * *"    # 台北 10:00
    - cron: "0 6 * * *"    # 台北 14:00
    - cron: "0 10 * * *"   # 台北 18:00
  workflow_dispatch:

# 允許 workflow 把新資料 push 回 repo
permissions:
  contents: write

# 避免多個排程同時執行造成 push 衝突
concurrency:
  group: track-occupancy
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    # 每次跑約 4 小時，設定 4.5 小時上限保險（runner 單 job 上限為 6 小時）
    timeout-minutes: 270
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 設定 git 身分
        run: |
          git config user.name  "occupancy-bot"
          git config user.email "occupancy-bot@users.noreply.github.com"

      - name: 持續抓取（每 10 分鐘一筆，跑約 4 小時）
        # 240 分鐘 ÷ 10 分鐘 ≈ 24 筆；每抓一筆就 push，資料即時落地。
        # 超過台北 22:00 會自動停止。
        run: python fetch.py --interval 600 --duration-minutes 240 --push
